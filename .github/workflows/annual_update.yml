name: Annual NPB Update

on:
  schedule:
    - cron: '0 9 1 3 *'   # 毎年3月1日 9:00 UTC（FA・移籍確定後、開幕前）
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図'
        required: false
        type: string
      data_end_year:
        description: 'Last season year (e.g., 2025). Leave blank for previous year.'
        required: false
        default: ''
      hf_only:
        description: 'Skip fetch/projections — only sync current repo data/ to Hugging Face'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

# Storage: data/ in this repo is canonical (git-versioned). Each run also
# mirrors data/ to the public HF dataset yasumorishima/npb-stats so all
# baseball datasets live in one place (same as mlb-stats / japan-geohazard).
# BQ steps are legacy (continue-on-error); HF is the cloud store of record.
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: github.event.inputs.hf_only != 'true'
        run: pip install pandas numpy beautifulsoup4 requests lxml scikit-learn lightgbm xgboost joblib wandb pyarrow

      - name: Set DATA_END_YEAR
        if: github.event.inputs.hf_only != 'true'
        run: |
          if [ -n "${{ github.event.inputs.data_end_year }}" ]; then
            echo "NPB_DATA_END_YEAR=${{ github.event.inputs.data_end_year }}" >> $GITHUB_ENV
          else
            # 3月実行: 前年シーズンのデータを対象にする
            echo "NPB_DATA_END_YEAR=$(($(date +'%Y') - 1))" >> $GITHUB_ENV
          fi

      - name: 1. Fetch hitter/pitcher stats
        if: github.event.inputs.hf_only != 'true'
        run: python fetch_npb_data.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: 2. Fetch detailed batting stats
        if: github.event.inputs.hf_only != 'true'
        run: python fetch_npb_detailed.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: 3. Fetch NPB registered player roster (FA・移籍確定後)
        if: github.event.inputs.hf_only != 'true'
        run: python fetch_rosters.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: 4. Fetch standings + Pythagorean
        if: github.event.inputs.hf_only != 'true'
        run: python pythagorean.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: 5. Calculate wOBA/wRC+ (sabermetrics)
        if: github.event.inputs.hf_only != 'true'
        run: python sabermetrics.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: 6. Marcel projections
        if: github.event.inputs.hf_only != 'true'
        run: python marcel_projection.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: 7. ML projections (LightGBM/XGBoost)
        if: github.event.inputs.hf_only != 'true'
        run: python ml_projection.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          PYTHONUNBUFFERED: "1"

      - name: 8. Bayesian projections (Stan correction + BMA + foreign players)
        if: github.event.inputs.hf_only != 'true'
        run: python bayes_projection.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: 9. Team Monte Carlo simulation (10,000 draws)
        if: github.event.inputs.hf_only != 'true'
        run: python team_simulation.py
        env:
          NPB_DATA_END_YEAR: ${{ env.NPB_DATA_END_YEAR }}
          PYTHONUNBUFFERED: "1"

      - name: Commit and push updated data
        if: github.event.inputs.hf_only != 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "auto: update NPB data and projections for ${NPB_DATA_END_YEAR} season ($(date +'%Y-%m-%d'))"
            git push
          fi

      # === Hugging Face mirror (canonical cloud store) ===
      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.26"

      - name: Upload data/ to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set — cannot sync to HF"
            exit 1
          fi
          hf upload yasumorishima/npb-stats data data \
            --repo-type dataset \
            --commit-message "Sync npb-prediction data/ ($(date +'%Y-%m-%d'))"
          echo "Synced data/ -> https://huggingface.co/datasets/yasumorishima/npb-stats"
